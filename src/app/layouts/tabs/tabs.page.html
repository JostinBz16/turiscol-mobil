<ion-tabs #tabs (ionTabsDidChange)="getCurrentTab($event)">
  <!-- Barra inferior -->

  <ion-tab-bar slot="bottom">
    <ion-tab-button tab="home">
      <ion-icon
        [name]="currenTab() === 'home' ? 'home' : 'home-outline'"
      ></ion-icon>
      <ion-label>Inicio</ion-label>
    </ion-tab-button>

    <ion-tab-button tab="destination">
      <ion-icon
        [name]="currenTab() === 'destination' ? 'map' :'map-outline'"
      ></ion-icon>
      <ion-label>Explorar</ion-label>
    </ion-tab-button>

    <ion-tab-button tab="likes">
      <ion-icon
        [name]="currenTab() === 'likes' ? 'heart' :'heart-outline'"
      ></ion-icon>
      <ion-label>Me gusta</ion-label>
    </ion-tab-button>

    <ion-tab-button tab="account">
      <ion-icon
        [name]="currenTab() === 'account' ? 'person' :'person-outline'"
      ></ion-icon>
      <ion-label>Perfil</ion-label>
    </ion-tab-button>
  </ion-tab-bar>
</ion-tabs>
