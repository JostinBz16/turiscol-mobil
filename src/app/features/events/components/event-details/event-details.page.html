<ion-content [fullscreen]="true">
  <ion-header class="ion-no-border" slot="fixed">
    <ion-toolbar>
      <ion-buttons>
        <ion-back-button
          mode="md"
          [defaultHref]="navService.returnUrl()"
          class="btnbg btnbglight"
        ></ion-back-button>
      </ion-buttons>
    </ion-toolbar>
  </ion-header>

  @let product = {};

  <ion-content>
    <p>{{ product | json }}</p>
  </ion-content>
</ion-content>
