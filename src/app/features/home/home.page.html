<ion-header translucent="true" class="home-header">
  <ion-toolbar>
    <div class="header-content">
      <div class="header-text">
        <span class="welcome">Hola, Jostin 👋</span>
        <h2>Explora Colombia</h2>
      </div>

      <ion-avatar class="avatar">
        <img src="assets/avatar.jpg" />
      </ion-avatar>
    </div>
  </ion-toolbar>
</ion-header>

<ion-content class="home-content">
  <div class="content-wrapper">
    <!-- 🔍 Buscador -->
    <div class="search-box">
      <ion-icon name="search-outline"></ion-icon>
      <input placeholder="¿A dónde quieres viajar?" />
    </div>

    <div class="section">
      <h3>Categorías</h3>

      <div class="carousel">
        @for (c of categories; track c.id) {
        <div class="carousel-item category-card">
          <span>{{ c.label }}</span>
        </div>
        }
      </div>
    </div>

    <!-- 🌍 Destinos -->
    <div class="section">
      <h3>Destinos destacados</h3>

      <div class="carousel destinations-carousel">
        @for (d of destinations; track d.id) {
        <div class="carousel-item destination-card">
          <img [src]="d.image" />
          <div class="overlay">
            <h4>{{ d.name }}</h4>
            <span>{{ d.city }}</span>
          </div>
        </div>
        }
      </div>
    </div>

    <!-- ⭐ Planes -->
    <div class="section">
      <h3>Planes recomendados</h3>

      <div class="plan-card" *ngFor="let p of plans">
        <img [src]="p.image" />

        <div class="plan-info">
          <h4>{{ p.title }}</h4>
          <p>{{ p.description }}</p>

          <div class="plan-footer">
            <span class="price">${{ p.price }}</span>
            <ion-button size="small">Ver</ion-button>
          </div>
        </div>
      </div>
    </div>
  </div>
</ion-content>
