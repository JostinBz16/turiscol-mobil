<ion-header class="home-header">
  <ion-toolbar>
    <ion-title>Mi Cuenta</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content fullscreen class="account-content">
  <!-- Header -->
  <div class="account-header">
    <div class="icon-wrapper">
      <ion-icon name="person-outline"></ion-icon>
    </div>

    <h2 class="name">John Doe</h2>
    <p class="email">john.doe@example.com</p>
  </div>

  <!-- Opciones -->
  <ion-list class="account-list" lines="none">
    <ion-item button detail="false" (click)="goToEditProfile()">
      <div class="item-left">
        <div class="icon-box">
          <ion-icon name="create-outline"></ion-icon>
        </div>
        <span>Editar Perfil</span>
      </div>

      <ion-icon
        slot="end"
        name="chevron-forward-outline"
        class="chevron"
      ></ion-icon>
    </ion-item>

    <ion-item button detail="false" (click)="goToReservations()">
      <div class="item-left">
        <div class="icon-box">
          <ion-icon name="bookmark-outline"></ion-icon>
        </div>
        <span>Mis Reservas</span>
      </div>

      <ion-icon
        slot="end"
        name="chevron-forward-outline"
        class="chevron"
      ></ion-icon>
    </ion-item>

    <ion-item button detail="false">
      <div class="item-left">
        <div class="icon-box">
          <ion-icon name="notifications-outline"></ion-icon>
        </div>
        <span>Notificaciones</span>
      </div>

      <ion-icon
        slot="end"
        name="chevron-forward-outline"
        class="chevron"
      ></ion-icon>
    </ion-item>
  </ion-list>

  <!-- Logout -->
  <div class="logout-container">
    <ion-button color="danger" expand="block" (click)="logout()">
      <ion-icon slot="start" name="log-out-outline"></ion-icon>
      Cerrar Sesión
    </ion-button>
  </div>
</ion-content>
