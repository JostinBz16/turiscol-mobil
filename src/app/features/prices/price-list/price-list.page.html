<ion-header>
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-back-button defaultHref="/tabs/prices"></ion-back-button>
    </ion-buttons>

    <ion-title>Lista de precios</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content>
  <ion-card class="card-list">
    <ion-card-content>
      <table class="price-table">
        <thead>
          <tr>
            <th>Producto</th>
            <th>Ciudad</th>
            <th>Precio</th>
          </tr>
        </thead>

        <tbody>
          @for (item of prices; track item) {
          <tr>
            <td>{{ item.name }}</td>
            <td>{{ item.city }}</td>
            <td>{{ item.price }}</td>
          </tr>
          }
        </tbody>
      </table>
    </ion-card-content>
  </ion-card>
</ion-content>
